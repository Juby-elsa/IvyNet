{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center py-5 animate-fade-in">
    <div class="col-md-5">
        <div class="bg-white p-5 rounded-4 border shadow-sm">
            <h2 class="fw-bold mb-4 text-center">Join <span class="text-primary">IvyNet</span></h2>
            <form method="POST">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-muted small">First Name</label>
                        <input type="text" name="first_name" class="form-control rounded-3" placeholder="First Name"
                            required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-muted small">Last Name</label>
                        <input type="text" name="last_name" class="form-control rounded-3" placeholder="Last Name"
                            required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold text-muted small">Username</label>
                    <input type="text" name="username" class="form-control rounded-3" placeholder="Username" required>
                    {% if form.username.help_text %}
                    <div class="form-text small text-muted" style="font-size: 0.7rem;">{{ form.username.help_text }}
                    </div>
                    {% endif %}
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold text-muted small">Email Address</label>
                    <input type="email" name="email" class="form-control rounded-3" placeholder="email@university.edu"
                        required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold text-muted small">Domain of Interest</label>
                    <select name="domain_interest" class="form-select rounded-3">
                        <option value="AI">Artificial Intelligence</option>
                        <option value="LAW">Law</option>
                        <option value="BIO">Biomedical</option>
                        <option value="ENG">Engineering</option>
                        <option value="ECE">Electronics and Communication</option>
                        <option value="OTHER">Other</option>
                    </select>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-muted small">Password</label>
                        <input type="password" name="password1" class="form-control rounded-3" placeholder="Password"
                            required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-muted small">Confirm Password</label>
                        <input type="password" name="password2" class="form-control rounded-3"
                            placeholder="Confirm Password" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill fw-bold mt-3 border-0 shadow-sm"
                    style="background: linear-gradient(45deg, #007bff, #0056b3);">Create Academic Profile</button>
            </form>
            <div class="mt-4 text-center">
                <p class="text-secondary small">Already have an account? <a href="{% url 'login' %}"
                        class="text-primary fw-bold text-decoration-none">Sign In</a></p>
            </div>
        </div>
    </div>
</div>

<style>
    input {
        display: block;
        width: 100%;
        padding: 0.375rem 0.75rem;
        font-size: 1rem;
        font-weight: 400;
        line-height: 1.5;
        color: #212529;
        background-color: #fff;
        background-clip: padding-box;
        border: 1px solid #dee2e6;
        border-radius: 0.375rem;
        transition: border-color .15s ease-in-out, box-shadow .15s ease-in-out;
    }
</style>
{% endblock %}
